# ═══════════════════════════════════════════════════════════════════════════
# DATABRICKS ASSET BUNDLE - CS RECEIPT LOOKUP PLATFORM
# Production-ready, customer-agnostic receipt lookup solution for retailers
# ═══════════════════════════════════════════════════════════════════════════
bundle:
  name: cs-receipt-lookup-${var.customer_name}

# ─────────────────────────────────────────────────────────────────
# Global Variables — Customer-Agnostic Configuration
# Override via: --var customer_name=acme_retail or environment configs
# ─────────────────────────────────────────────────────────────────
variables:
  # Customer Identity
  customer_name:
    description: "Customer identifier (lowercase, underscores only)"
    default: "acme_retail"

  customer_display_name:
    description: "Customer display name for UI"
    default: "Acme Retail"

  # Unity Catalog Configuration
  catalog:
    description: "Unity Catalog name (typically same as customer_name)"
    default: "${var.customer_name}"

  lakebase_catalog:
    description: "Lakebase serving catalog name"
    default: "${var.customer_name}_serving"

  # Lakebase Database Configuration
  lakebase_instance_name:
    description: "Lakebase instance name"
    default: "${var.customer_name}-receipt-db"

  lakebase_capacity:
    description: "Lakebase compute capacity (CU_1, CU_2, CU_4, CU_8)"
    default: "CU_2"

  # AI Model Endpoints
  embedding_endpoint:
    description: "Embedding model serving endpoint"
    default: databricks-bge-large-en

  llm_endpoint:
    description: "LLM model serving endpoint"
    default: databricks-claude-sonnet-4

  # Email Configuration
  smtp_from_address:
    description: "SMTP from address for receipt emails"
    default: "receipts@${var.customer_name}.com"

  # Deployment Metadata
  deployment_env:
    description: "Deployment environment (dev, staging, prod)"
    default: "dev"

  cost_center:
    description: "Cost center for billing"
    default: "cs-operations"

# ─────────────────────────────────────────────────────────────────
# Targets — Environment-Specific Overrides
# ─────────────────────────────────────────────────────────────────
targets:
  dev:
    mode: development
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/${var.customer_name}_receipts
    variables:
      lakebase_instance_name: ${var.customer_name}-receipt-db-dev
      deployment_env: dev
    default: true

  staging:
    mode: production
    workspace:
      root_path: /Workspace/${var.customer_name}/cs-receipt-lookup/staging
    variables:
      lakebase_instance_name: ${var.customer_name}-receipt-db-stg
      deployment_env: staging

  prod:
    mode: production
    workspace:
      root_path: /Workspace/${var.customer_name}/cs-receipt-lookup/prod
    variables:
      lakebase_instance_name: ${var.customer_name}-receipt-db-prod
      deployment_env: prod

# ─────────────────────────────────────────────────────────────────
# Resources — Customer-Agnostic Databricks Objects
# ─────────────────────────────────────────────────────────────────
resources:

  # ── Lakeflow Declarative Pipelines (medallion) ──────────────────
  pipelines:
    bronze_pipeline:
      name: ${var.customer_name}-receipt-bronze-${bundle.target}
      catalog: ${var.catalog}
      target: bronze
      libraries:
        - file:
            path: pipelines/bronze_receipt_ingest.py

    silver_pipeline:
      name: ${var.customer_name}-receipt-silver-${bundle.target}
      catalog: ${var.catalog}
      target: silver
      libraries:
        - file:
            path: pipelines/silver_receipt_transform.py

    gold_pipeline:
      name: ${var.customer_name}-receipt-gold-${bundle.target}
      catalog: ${var.catalog}
      target: gold
      libraries:
        - file:
            path: pipelines/gold_receipt_insights.py

  # ── Workflow Jobs ────────────────────────────────────────────────
  jobs:
    nightly_embeddings:
      name: ${var.customer_name}-nightly-product-embeddings-${bundle.target}
      description: >
        Nightly product embedding pipeline.
        Reads ${var.catalog}.gold.product_catalog, generates pgvector embeddings
        via ${var.embedding_endpoint}, upserts into Lakebase product_embeddings table.
      max_concurrent_runs: 1
      schedule:
        quartz_cron_expression: "0 0 2 * * ?"
        timezone_id: America/New_York
        pause_status: UNPAUSED
      tags:
        project: ${var.customer_name}-receipt-lookup
        team: cs-ops
        phase: "4-ai"
        customer: ${var.customer_name}
        environment: ${var.deployment_env}
      tasks:
        - task_key: embed_products
          description: >
            Generate embeddings for all products in ${var.catalog}.gold.product_catalog
            and upsert into Lakebase product_embeddings (pgvector HNSW index).
          spark_python_task:
            python_file: ./ai/embedding_pipeline.py
          environment_key: embedding_env
      environments:
        - environment_key: embedding_env
          spec:
            client: "2"
            dependencies:
              - psycopg[binary]
              - mlflow
              - databricks-sdk

  # ── Databricks App ────────────────────────────────────────────────
  apps:
    cs_receipt_lookup:
      name: ${var.customer_name}-cs-receipt-lookup
      description: >
        ${var.customer_display_name} CS Receipt Lookup — AI-powered receipt search for Customer Service reps.
        Fuzzy search, semantic search, customer context cards, receipt delivery (email/print).
        Internal CS tool — Azure AD RBAC, full audit trail.
      source_code_path: ./app
      # Runtime config (command, env, resources) is defined in app/app.yaml
      # App will read configuration from environment variables injected by DAB
