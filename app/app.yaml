# CS Receipt Lookup Platform — Databricks App Configuration
# Customer-agnostic app configuration for retail receipt lookup solution.
# Docs: https://docs.databricks.com/en/dev-tools/databricks-apps/index.html
#
# DEPLOYMENT INSTRUCTIONS:
# Before deploying for your customer, update these values:
#   - LAKEBASE_INSTANCE_NAME: Set to your Lakebase instance (e.g., "your_company-receipt-db")
#   - PGDATABASE: Set to your Lakebase database name (typically matches customer_name in databricks.yml)
#   - resources.instance_name: Must match LAKEBASE_INSTANCE_NAME
#   - CUSTOMER_DISPLAY_NAME: Set to your company's display name for UI

command:
  - "uvicorn"
  - "main:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

# Authentication & Authorization (Platform-Level)
# Databricks Apps enforces auth and injects verified identity headers:
#   X-Forwarded-Email, X-Forwarded-User, X-Forwarded-Access-Token
# Configure who can access this app (update group names for your organization):
permissions:
  # Grant access to specific workspace groups (customize for your organization)
  - group_name: "cs_team"
    permission_level: "CAN_VIEW"
  - group_name: "supervisors"
    permission_level: "CAN_VIEW"
  - group_name: "fraud_team"
    permission_level: "CAN_VIEW"
  # Individual users (e.g., for testing/admin) - update with your admin email
  - user_name: "lawrence.kyei@databricks.com"
    permission_level: "CAN_MANAGE"

# Environment Variables
# IMPORTANT: Update these values for your customer deployment:
#   - LAKEBASE_INSTANCE_NAME: Your Lakebase instance name (from databricks.yml var.lakebase_instance_name)
#   - PGDATABASE: Your database name (typically same as customer_name in databricks.yml)
#   - CUSTOMER_DISPLAY_NAME: Your company's display name (from databricks.yml var.customer_display_name)
#
# PGHOST and PGUSER are automatically resolved by the app from the Lakebase instance
# and Databricks workspace authentication, but can be overridden here if needed.
env:
  # Lakebase connection parameters (UPDATE FOR YOUR DEPLOYMENT)
  - name: LAKEBASE_INSTANCE_NAME
    value: "giant-eagle-receipt-db-v2"  # CHANGE THIS: matches databricks.yml lakebase_instance_name
  - name: PGDATABASE
    value: "databricks_postgres"  # Standard Lakebase database name
  - name: PGPORT
    value: "5432"
  - name: PGSSLMODE
    value: "require"

  # Customer branding (UPDATE FOR YOUR DEPLOYMENT)
  - name: CUSTOMER_DISPLAY_NAME
    value: "Giant Eagle"  # CHANGE THIS: matches databricks.yml customer_display_name

# Lakebase Resource Declaration
# The instance_name must match LAKEBASE_INSTANCE_NAME above
resources:
  - name: lakebase-instance
    type: lakebase
    instance_name: "giant-eagle-receipt-db-v2"  # CHANGE THIS: matches LAKEBASE_INSTANCE_NAME

  - name: model-serving
    type: serving_endpoint
    endpoint_name: "databricks-claude-sonnet-4"  # Or your preferred LLM endpoint

  - name: embedding-model
    type: serving_endpoint
    endpoint_name: "databricks-bge-large-en"  # Or your preferred embedding model
